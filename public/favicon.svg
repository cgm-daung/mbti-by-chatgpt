<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Cognitive functions profile">
  <defs>
    <linearGradient id="tile" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="shine" x1="8" y1="5" x2="22" y2="15" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#tile)"/>
  <ellipse cx="15" cy="10" rx="11" ry="6.5" fill="url(#shine)"/>
  <!-- ဖန်ရှင်ရှင်း ဘားချား အကြမ်းဖျင်း — အသေးတွင် လွယ်ကူစွာ ဖတ်ရ -->
  <rect x="5.5" y="19" width="4" height="7" rx="2" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="11.5" y="15" width="4" height="11" rx="2" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="17.5" y="17" width="4" height="9" rx="2" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="23.5" y="12" width="4" height="14" rx="2" fill="#ffffff" fill-opacity="0.95"/>
</svg>
